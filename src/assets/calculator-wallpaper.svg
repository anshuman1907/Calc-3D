<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="desk" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1c1410"/>
      <stop offset="50%" stop-color="#2a1f18"/>
      <stop offset="100%" stop-color="#120e0c"/>
    </linearGradient>
    <linearGradient id="calcPurple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c6cf0"/>
      <stop offset="100%" stop-color="#5b4bb7"/>
    </linearGradient>
    <linearGradient id="calcDark" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3d3d4a"/>
      <stop offset="100%" stop-color="#252530"/>
    </linearGradient>
    <linearGradient id="lcd" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#d4f5e2"/>
      <stop offset="100%" stop-color="#8ee4b0"/>
    </linearGradient>
    <linearGradient id="paper" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8f4ec"/>
      <stop offset="100%" stop-color="#e8e0d0"/>
    </linearGradient>
    <radialGradient id="lamp" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffd89b" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#ffd89b" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bokeh1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#667eea" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#667eea" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur40"><feGaussianBlur stdDeviation="40"/></filter>
    <filter id="blur8"><feGaussianBlur stdDeviation="8"/></filter>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#000" flood-opacity="0.45"/>
    </filter>
  </defs>

  <rect width="1920" height="1080" fill="url(#desk)"/>
  <ellipse cx="960" cy="200" rx="700" ry="400" fill="url(#lamp)"/>
  <circle cx="200" cy="150" r="200" fill="url(#bokeh1)" filter="url(#blur40)"/>
  <circle cx="1700" cy="900" r="250" fill="url(#bokeh1)" filter="url(#blur40)"/>

  <!-- Scattered math papers -->
  <g opacity="0.55" filter="url(#shadow)">
    <g transform="translate(120, 620) rotate(-8)">
      <rect width="220" height="280" rx="4" fill="url(#paper)"/>
      <text x="20" y="50" font-family="serif" font-size="16" fill="#555">2x + 5 = 17</text>
      <text x="20" y="85" font-family="serif" font-size="16" fill="#555">x = 6</text>
      <line x1="20" y1="110" x2="200" y2="110" stroke="#ccc" stroke-width="1"/>
      <text x="20" y="150" font-family="serif" font-size="14" fill="#888">&#8730;144 = 12</text>
      <text x="20" y="185" font-family="serif" font-size="14" fill="#888">15% of 80 = 12</text>
    </g>
    <g transform="translate(1580, 180) rotate(12)">
      <rect width="180" height="220" rx="4" fill="url(#paper)"/>
      <text x="18" y="45" font-family="serif" font-size="15" fill="#555">3.14 &#215; 2</text>
      <text x="18" y="78" font-family="serif" font-size="15" fill="#555">= 6.28</text>
      <text x="18" y="130" font-family="monospace" font-size="13" fill="#999">1010 + 0101</text>
      <text x="18" y="160" font-family="monospace" font-size="13" fill="#999">= 1111</text>
    </g>
  </g>

  <!-- Main calculator - center left, hero -->
  <g transform="translate(280, 280) rotate(-6)" filter="url(#shadow)">
    <rect x="0" y="0" width="340" height="460" rx="28" fill="url(#calcPurple)"/>
    <rect x="0" y="0" width="340" height="460" rx="28" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="2"/>
    <rect x="28" y="28" width="284" height="88" rx="14" fill="url(#lcd)"/>
    <rect x="28" y="28" width="284" height="88" rx="14" fill="none" stroke="rgba(0,80,40,0.2)" stroke-width="1"/>
    <text x="296" y="88" text-anchor="end" font-family="monospace" font-size="42" font-weight="bold" fill="#1a5c35">847.52</text>
    <!-- buttons -->
    <g>
      <rect x="28" y="140" width="62" height="58" rx="10" fill="rgba(255,255,255,0.92)"/>
      <text x="59" y="178" text-anchor="middle" font-family="sans-serif" font-size="22" font-weight="700" fill="#333">7</text>
      <rect x="100" y="140" width="62" height="58" rx="10" fill="rgba(255,255,255,0.92)"/>
      <text x="131" y="178" text-anchor="middle" font-family="sans-serif" font-size="22" font-weight="700" fill="#333">8</text>
      <rect x="172" y="140" width="62" height="58" rx="10" fill="rgba(255,255,255,0.92)"/>
      <text x="203" y="178" text-anchor="middle" font-family="sans-serif" font-size="22" font-weight="700" fill="#333">9</text>
      <rect x="244" y="140" width="68" height="58" rx="10" fill="#ff8c42"/>
      <text x="278" y="178" text-anchor="middle" font-family="sans-serif" font-size="24" font-weight="700" fill="#fff">&#247;</text>

      <rect x="28" y="210" width="62" height="58" rx="10" fill="rgba(255,255,255,0.92)"/>
      <text x="59" y="248" text-anchor="middle" font-family="sans-serif" font-size="22" font-weight="700" fill="#333">4</text>
      <rect x="100" y="210" width="62" height="58" rx="10" fill="rgba(255,255,255,0.92)"/>
      <text x="131" y="248" text-anchor="middle" font-family="sans-serif" font-size="22" font-weight="700" fill="#333">5</text>
      <rect x="172" y="210" width="62" height="58" rx="10" fill="rgba(255,255,255,0.92)"/>
      <text x="203" y="248" text-anchor="middle" font-family="sans-serif" font-size="22" font-weight="700" fill="#333">6</text>
      <rect x="244" y="210" width="68" height="58" rx="10" fill="#ff8c42"/>
      <text x="278" y="248" text-anchor="middle" font-family="sans-serif" font-size="24" font-weight="700" fill="#fff">&#215;</text>

      <rect x="28" y="280" width="62" height="58" rx="10" fill="rgba(255,255,255,0.92)"/>
      <text x="59" y="318" text-anchor="middle" font-family="sans-serif" font-size="22" font-weight="700" fill="#333">1</text>
      <rect x="100" y="280" width="62" height="58" rx="10" fill="rgba(255,255,255,0.92)"/>
      <text x="131" y="318" text-anchor="middle" font-family="sans-serif" font-size="22" font-weight="700" fill="#333">2</text>
      <rect x="172" y="280" width="62" height="58" rx="10" fill="rgba(255,255,255,0.92)"/>
      <text x="203" y="318" text-anchor="middle" font-family="sans-serif" font-size="22" font-weight="700" fill="#333">3</text>
      <rect x="244" y="280" width="68" height="58" rx="10" fill="#ff8c42"/>
      <text x="278" y="318" text-anchor="middle" font-family="sans-serif" font-size="24" font-weight="700" fill="#fff">&#8722;</text>

      <rect x="28" y="350" width="134" height="58" rx="10" fill="rgba(255,255,255,0.92)"/>
      <text x="95" y="388" text-anchor="middle" font-family="sans-serif" font-size="22" font-weight="700" fill="#333">0</text>
      <rect x="172" y="350" width="62" height="58" rx="10" fill="rgba(255,255,255,0.92)"/>
      <text x="203" y="388" text-anchor="middle" font-family="sans-serif" font-size="22" font-weight="700" fill="#333">.</text>
      <rect x="244" y="350" width="68" height="128" rx="10" fill="#2ecc71"/>
      <text x="278" y="420" text-anchor="middle" font-family="sans-serif" font-size="28" font-weight="700" fill="#fff">=</text>

      <rect x="28" y="420" width="62" height="58" rx="10" fill="#e74c3c"/>
      <text x="59" y="458" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="700" fill="#fff">C</text>
      <rect x="100" y="420" width="134" height="58" rx="10" fill="#ff8c42"/>
      <text x="167" y="458" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="700" fill="#fff">+</text>
    </g>
  </g>

  <!-- Second calculator - top right, dark scientific -->
  <g transform="translate(1180, 120) rotate(8)" filter="url(#shadow)" opacity="0.9">
    <rect x="0" y="0" width="300" height="200" rx="12" fill="url(#calcDark)"/>
    <rect x="16" y="16" width="268" height="56" rx="6" fill="url(#lcd)"/>
    <text x="272" y="54" text-anchor="end" font-family="monospace" font-size="28" font-weight="bold" fill="#1a5c35">sin(45)=0.707</text>
    <g fill="rgba(200,200,210,0.85)">
      <rect x="16" y="88" width="48" height="36" rx="5"/><rect x="72" y="88" width="48" height="36" rx="5"/>
      <rect x="128" y="88" width="48" height="36" rx="5"/><rect x="184" y="88" width="48" height="36" rx="5"/>
      <rect x="240" y="88" width="44" height="36" rx="5" fill="#4a6cf7"/>
      <rect x="16" y="132" width="48" height="36" rx="5"/><rect x="72" y="132" width="48" height="36" rx="5"/>
      <rect x="128" y="132" width="100" height="36" rx="5"/><rect x="236" y="132" width="48" height="36" rx="5" fill="#2ecc71"/>
    </g>
  </g>

  <!-- Small pocket calculator bottom right -->
  <g transform="translate(1350, 680) rotate(-15)" filter="url(#shadow)" opacity="0.75">
    <rect x="0" y="0" width="200" height="280" rx="16" fill="#4a5568"/>
    <rect x="16" y="16" width="168" height="50" rx="8" fill="url(#lcd)"/>
    <text x="176" y="50" text-anchor="end" font-family="monospace" font-size="22" font-weight="bold" fill="#1a5c35">42</text>
    <g fill="rgba(220,220,230,0.9)">
      <rect x="16" y="82" width="36" height="32" rx="6"/><rect x="60" y="82" width="36" height="32" rx="6"/>
      <rect x="104" y="82" width="36" height="32" rx="6"/><rect x="148" y="82" width="36" height="32" rx="6" fill="#f6ad55"/>
      <rect x="16" y="124" width="36" height="32" rx="6"/><rect x="60" y="124" width="36" height="32" rx="6"/>
      <rect x="104" y="124" width="36" height="32" rx="6"/><rect x="148" y="124" width="36" height="32" rx="6" fill="#f6ad55"/>
      <rect x="16" y="166" width="80" height="32" rx="6"/>
      <rect x="104" y="166" width="80" height="90" rx="6" fill="#48bb78"/>
    </g>
  </g>

  <!-- Pencil -->
  <g transform="translate(700, 780) rotate(25)" opacity="0.6">
    <rect x="0" y="0" width="180" height="14" rx="3" fill="#f6c453"/>
    <polygon points="180,0 200,7 180,14" fill="#2d3748"/>
    <rect x="0" y="0" width="20" height="14" rx="3" fill="#e53e3e"/>
  </g>

  <!-- Large faded calculator watermark -->
  <g opacity="0.06" transform="translate(900, 400) scale(2.5)">
    <rect x="0" y="0" width="200" height="280" rx="20" fill="#fff"/>
    <rect x="16" y="16" width="168" height="50" rx="8" fill="#8ee4b0"/>
    <g fill="rgba(200,200,200,0.8)">
      <rect x="16" y="80" width="36" height="32" rx="6"/><rect x="60" y="80" width="36" height="32" rx="6"/>
      <rect x="104" y="80" width="36" height="32" rx="6"/><rect x="148" y="80" width="36" height="32" rx="6"/>
      <rect x="16" y="122" width="36" height="32" rx="6"/><rect x="60" y="122" width="36" height="32" rx="6"/>
      <rect x="104" y="122" width="36" height="32" rx="6"/><rect x="148" y="122" width="80" height="70" rx="6"/>
    </g>
  </g>

  <!-- Floating math symbols -->
  <g font-family="Georgia, serif" fill="#c4b5fd" opacity="0.12">
    <text x="850" y="550" font-size="90">+</text>
    <text x="1100" y="850" font-size="70">&#215;</text>
    <text x="500" y="200" font-size="60">%</text>
    <text x="1500" y="500" font-size="80">&#960;</text>
  </g>

  <!-- Vignette -->
  <rect width="1920" height="1080" fill="url(#desk)" opacity="0.35" style="mix-blend-mode:multiply"/>
  <rect width="1920" height="1080" fill="none" stroke="none"/>
  <defs>
    <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
      <stop offset="40%" stop-color="transparent"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.6"/>
    </radialGradient>
  </defs>
  <rect width="1920" height="1080" fill="url(#vignette)"/>
</svg>
